name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dist/**'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-and-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install system libraries for headless Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk-bridge2.0-0 libx11-xcb1 libxcomposite1 \
            libxdamage1 libxrandr2 libgbm1 libpangocairo-1.0-0 \
            libasound2t64 libgtk-3-0

      - name: Install dependencies
        run: npm ci

      - name: Build (reviews fetch, vite build, prerender, sitemap, indexnow)
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
        run: npm run build

      - name: Commit dist/ if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ src/data/googleReviews.json
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "chore: rebuild dist via CI [skip ci]"
            # Push. Falls das Remote sich weiterbewegt hat (neuerer Commit gepusht,
            # während dieser Build lief), ist dieses dist/ veraltet — dann NICHT
            # erzwingen, sondern sauber überspringen: der neuere Commit hat seinen
            # eigenen Build, der das korrekte dist/ pusht. Kein CI-"failure" mehr.
            if git push; then
              echo "dist/ gepusht."
            else
              echo "::notice::Push abgelehnt — neuerer Commit existiert, dessen Build baut das aktuelle dist/. Übersprungen."
            fi
          fi
